server {
    listen 80;
    server_name wsnox.urldot.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name wsnox.urldot.ru;

    ssl_certificate     /etc/letsencrypt/live/wsnox.urldot.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wsnox.urldot.ru/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10M;

    # Hashed Vite assets — filename includes content hash, safe to cache forever
    location /assets/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Service worker — must always be fresh, otherwise old SW shadows new code forever
    location = /sw.js {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Cache-Control "no-cache" always;
    }

    location / {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # SPA index.html is rebuilt with new asset hashes on every deploy — never let browsers cache it
        add_header Cache-Control "no-cache" always;
    }
}
