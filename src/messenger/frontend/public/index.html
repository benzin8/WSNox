<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Messenger</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <div class="app-container">
    <header class="chat-header">
      <h2>💬 SecureChat</h2>
      <div class="status" id="connectionStatus">Соединение...</div>
    </header>

    <div class="chat-container">
      <div class="chat-box" id="chatBox"></div>

      <div class="input-area">
        <input
          type="text"
          id="messageInput"
          placeholder="Введите сообщение..."
          maxlength="500"
        />
        <button id="sendBtn" disabled>Отправить</button>
      </div>
    </div>
  </div>

  <script src="/static/js/socket_manager.js"></script>
  <script src="/static/js/send_button.js"></script>
</body>
</html>
