name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/benzin8/wsnox:latest .
          docker push ghcr.io/benzin8/wsnox:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            {
            echo "DB_USER=${{ secrets.DB_USER }}"
            echo "DB_PASS=${{ secrets.DB_PASS }}"
            echo "DB_HOST=${{ secrets.DB_HOST }}"
            echo "DB_PORT=${{ secrets.DB_PORT }}"
            echo "DB_NAME=${{ secrets.DB_NAME }}"
            echo "SMTP_HOST=${{ secrets.SMTP_HOST }}"
            echo "SMTP_PORT=${{ secrets.SMTP_PORT }}"
            echo "SMTP_USER=${{ secrets.SMTP_USER }}"
            echo "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}"
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}"
            echo "ALGORITHM=${{ secrets.ALGORITHM }}"
            echo "REDIS_URL=${{ secrets.REDIS_URL }}"
            echo "VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}"
            echo "VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}"
            echo "VAPID_MAILTO=${{ secrets.VAPID_MAILTO }}"
            echo "S3_BUCKET=${{ secrets.S3_BUCKET }}"
            echo "S3_PREFIX=prod"
            echo "S3_ACCESS_KEY_ID=${{ secrets.S3_ACCESS_KEY_ID }}"
            echo "S3_SECRET_ACCESS_KEY=${{ secrets.S3_SECRET_ACCESS_KEY }}"
            } > ~/WSNox/.env
            cd ~/WSNox
            git pull origin main
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            # Restart (not just `-s reload`) so nginx reliably re-reads the
            # bind-mounted config after `git pull` — a failed reload used to be
            # swallowed by `|| true`, leaving stale cache headers in memory.
            docker compose -f docker-compose.prod.yml restart nginx
            # Reclaim disk: each deploy pulls a new :latest image and the old one
            # becomes dangling. Unpruned, they fill the disk until nginx can no
            # longer spool large proxied responses and truncates the JS bundle
            # (blank app / endless splash). Prune unused images every deploy.
            docker image prune -af
