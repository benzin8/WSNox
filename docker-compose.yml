version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: messenger_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: messenger_db
      MYSQL_USER: messenger_user
      MYSQL_PASSWORD: messenger_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: messenger_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: .
    container_name: messenger_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DB_USER=messenger_user
      - DB_PASS=messenger_password
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=messenger_db
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-super-secret-key-change-it-in-production
      - ALGORITHM=HS256
    depends_on:
      - db
      - redis

volumes:
  db_data:
  redis_data:
